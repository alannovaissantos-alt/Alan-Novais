<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG - Crie sua Lenda</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Merriweather:wght@400;700;900&display=swap');

        :root {
            --bg-dark: #120d09; --parchment: #fdfaf0; --parchment-dark: #f0e6d2;
            --ink: #2c1a12; --ink-light: #5d4037; --gem-red: #d32f2f;
            --gem-blue: #1976d2; --gem-green: #388e3c; --gold: #d4af37;
            --glass-bg: rgba(253, 250, 240, 0.95); --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --radius: 16px;
        }

        body {
            background-color: var(--bg-dark); background-image: radial-gradient(circle at top, #2a1e14 0%, #0a0705 100%);
            color: var(--ink); font-family: 'Merriweather', serif; margin: 0; padding: 15px; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .app-container {
            background: var(--glass-bg); backdrop-filter: blur(10px); width: 100%; max-width: 450px;
            padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(212, 175, 55, 0.4);
            box-sizing: border-box; position: relative;
        }

        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--ink); margin-top: 0; text-align: center; }
        h1 { font-size: 28px; border-bottom: 2px solid rgba(212, 175, 55, 0.3); padding-bottom: 10px; margin-bottom: 20px; }

        label { font-weight: bold; display: block; margin-top: 15px; font-size: 14px; color: var(--ink-light); text-transform: uppercase; letter-spacing: 1px; }

        input[type="text"], select, textarea {
            width: 100%; padding: 14px; margin-top: 5px; margin-bottom: 5px; background: rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.1); color: var(--ink); font-family: 'Merriweather', serif;
            font-size: 15px; font-weight: bold; border-radius: 8px; box-sizing: border-box; transition: all 0.3s;
        }
        input[type="text"]:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 8px rgba(212, 175, 55, 0.3); }
        textarea { resize: vertical; min-height: 100px; font-weight: normal; font-family: monospace; font-size: 13px; }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px; font-family: 'Cinzel', serif;
            font-size: 15px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 8px; transition: transform 0.1s, box-shadow 0.2s; box-sizing: border-box; margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: linear-gradient(135deg, var(--ink) 0%, #1a0f0a 100%); color: var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-green { background: linear-gradient(135deg, var(--gem-green) 0%, #1b5e20 100%); color: white; box-shadow: 0 4px 15px rgba(56,142,60,0.4); }
        .btn-blue { background: linear-gradient(135deg, var(--gem-blue) 0%, #0d47a1 100%); color: white; box-shadow: 0 4px 15px rgba(25,118,210,0.4); }
        .btn-red { background: linear-gradient(135deg, var(--gem-red) 0%, #b71c1c 100%); color: white; box-shadow: 0 4px 15px rgba(211,47,47,0.4); }
        .btn-yellow { background: linear-gradient(135deg, #d4af37, #b8860b); color: var(--ink); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }

        .info-panel {
            background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.08); padding: 15px;
            margin-top: 10px; border-radius: 12px; font-size: 14px; line-height: 1.5; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02);
        }

        .points-box { text-align: center; background: linear-gradient(135deg, var(--ink) 0%, #1a0f0a 100%); color: var(--gold); padding: 15px; margin: 25px 0; border-radius: 12px; font-size: 18px; font-family: 'Cinzel', serif; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: white; padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .stat-name { font-weight: bold; font-size: 15px; flex-grow: 1; cursor: pointer; color: var(--ink); text-decoration: underline dotted var(--gold); text-underline-offset: 4px; transition: color 0.2s; }
        .stat-name:hover { color: var(--gold); }
        .stat-name span { font-size: 12px; vertical-align: super; text-decoration: none; display: inline-block; margin-left: 5px;}

        .stat-controls { display: flex; align-items: center; gap: 12px; }
        .btn-gem { background: var(--ink); color: var(--gold); border: 2px solid var(--gold); width: 32px; height: 32px; border-radius: 50%; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.1s; margin-bottom: 0;}
        .btn-gem:active { transform: scale(0.9); }
        .stat-value { font-size: 20px; font-weight: bold; width: 30px; text-align: center; font-family: 'Cinzel', serif; color: var(--gem-blue); }

        /* Modal Pop-up */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; opacity: 0; transition: opacity 0.2s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-card { background: var(--parchment); width: 100%; max-width: 360px; border-radius: 20px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); position: relative; color: var(--ink); box-sizing: border-box; }
        .modal-close { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.05); border: none; font-size: 18px; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; color: var(--ink); display: flex; align-items: center; justify-content: center; z-index: 10; margin-bottom: 0;}

        /* Animações e Telas */
        .screen { display: none; width: 100%; box-sizing: border-box; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .summary-header { text-align: center; margin-bottom: 20px; }
        .summary-name { font-size: 32px; margin-bottom: 5px; color: var(--ink); font-family: 'Cinzel', serif; text-transform: uppercase; }
        .summary-details { font-size: 15px; color: var(--ink-light); font-weight: bold; }
        .summary-personality-quote { font-size: 14px; margin: 15px auto; color: var(--ink-light); font-style: italic; background: rgba(0,0,0,0.03); padding: 12px; border-radius: 8px; border-left: 3px solid var(--gold); }

        .status-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.04); padding: 12px 5px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); font-weight: bold; font-size: 14px; }
        .status-item { text-align: center; }

        .attr-box { background: white; border: 1px solid rgba(0,0,0,0.08); padding: 15px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .attr-title { font-weight: bold; font-size: 15px; border-bottom: 1px dashed rgba(0,0,0,0.1); padding-bottom: 8px; margin-bottom: 8px; color: var(--ink); }
        .attr-desc { font-size: 13px; color: var(--ink-light); line-height: 1.5; }
        
        .summary-skill { background: linear-gradient(135deg, var(--ink) 0%, #1a0f0a 100%); color: var(--parchment); padding: 20px; border-radius: 12px; font-size: 14px; margin-top: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); position: relative; overflow: hidden; margin-bottom: 25px; }
        .summary-skill::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 5px; background: var(--gem-red); }
        .summary-skill-title { color: var(--gold); font-size: 16px; font-family: 'Cinzel', serif; font-weight: bold; margin-bottom: 8px; display: block; }

        /* MENU FLUTUANTE (FAB) */
        .fab-wrapper { position: relative; width: 100%; z-index: 20; margin-top: 20px; }
        .fab-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 15; opacity: 0; transition: opacity 0.3s; }
        .fab-overlay.show { display: block; opacity: 1; }
        
        .fab-options { position: absolute; bottom: 70px; left: 0; width: 100%; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transform: translateY(20px) scale(0.95); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; box-sizing: border-box; }
        .fab-options.open { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
    </style>
</head>
<body>

<div class="app-container" id="app">
    
    <div id="home-screen" class="screen active" style="text-align: center; padding: 30px 0;">
        <div style="font-size: 60px; margin-bottom: 10px;">⚔️</div>
        <h1 style="border-bottom: none; font-size: 32px; margin-bottom: 5px;">Lendas RPG</h1>
        <p style="color: var(--ink-light); margin-bottom: 40px; font-style: italic;">Forje seu destino e escolha seu caminho.</p>

        <button class="btn btn-green" style="padding: 20px; font-size: 16px; margin-bottom: 15px;" onclick="goToCreation()">
            ✨ CRIE SUA LENDA
        </button>
        <button class="btn btn-primary" style="padding: 20px; font-size: 16px;" onclick="openImportModal()">
            📥 IMPORTE SUA LENDA
        </button>
    </div>

    <div id="creation-screen" class="screen">
        <h1>Crie sua Lenda</h1>
        
        <label>Nome do Personagem:</label>
        <input type="text" id="char-name" placeholder="Ex: Aragorn">

        <label>Personalidade:</label>
        <select id="char-personality" onchange="updatePersonality()">
            <option value="O Boêmio (O Taverneiro)">O Boêmio (O Taverneiro)</option>
            <option value="O Mercenário Frio">O Mercenário Frio</option>
            <option value="O Rato de Masmorra">O Rato de Masmorra</option>
            <option value="O Galanteador">O Galanteador</option>
            <option value="O Sobrevivente Rabugento">O Sobrevivente Rabugento</option>
            <option value="O Paranoico Cauteloso">O Paranoico Cauteloso</option>
            <option value="O Fervoroso Sanguinário">O Fervoroso Sanguinário</option>
            <option value="O Escudo Humano">O Escudo Humano</option>
            <option value="O Aristocrata Arrogante">O Aristocrata Arrogante</option>
            <option value="O Justiceiro Inflexível">O Justiceiro Inflexível</option>
        </select>
        <div id="personality-panel" class="info-panel" style="font-style: italic; text-align: center;"></div>

        <label>Classe:</label>
        <select id="char-class" onchange="resetAndUpdate()">
            <option value="Guerreiro">Guerreiro</option>
            <option value="Arqueiro">Arqueiro</option>
            <option value="Mago">Mago</option>
            <option value="Necromante">Necromante</option>
            <option value="Druida">Druida</option>
            <option value="Soldado">Soldado</option>
            <option value="Assassino">Assassino</option>
            <option value="Bardo">Bardo</option>
        </select>

        <div id="class-details-panel" class="info-panel"></div>

        <div class="points-box">
            PONTOS LIVRES: <strong id="free-points-display" style="font-size: 24px; color: #fff;">5</strong>
        </div>

        <div id="stats-container"></div>

        <button class="btn btn-primary" style="margin-top: 25px;" onclick="generateSummary()">📜 GERAR FICHA TÉCNICA</button>
    </div>

    <div id="summary-screen" class="screen">
        <h1 style="margin-bottom: 20px;">Sua Ficha Técnica</h1>
        <div id="card-content"></div>
        
        <div class="fab-overlay" id="fab-overlay" onclick="toggleFabMenu()"></div>
        <div class="fab-wrapper">
            <div class="fab-options" id="fab-options">
                <button class="btn btn-yellow" onclick="exportCode()">💾 EXPORTAR CÓDIGO</button>
                <button class="btn btn-green" onclick="sendWhatsApp()">📲 ENVIAR MENSAGEM NO WHATSAPP</button>
                <button class="btn btn-blue" onclick="startGame()">🎲 INICIAR JOGO</button>
                <button class="btn btn-outline" style="border: 2px solid var(--ink); color: var(--ink); background: white;" onclick="goBack()">⬅️ VOLTAR E EDITAR</button>
            </div>
            <button class="btn btn-primary" id="fab-main-btn" onclick="toggleFabMenu()">📜 OPÇÕES DA LENDA</button>
        </div>
    </div>

</div>

<div class="modal-overlay" id="attribute-modal">
    <div class="modal-card">
        <button class="modal-close" onclick="closeAttributeModal()">×</button>
        <h2 id="modal-title" style="margin-bottom: 10px;"></h2>
        <div id="modal-desc" style="font-size: 14px; margin-bottom: 15px; color: var(--ink-light); line-height: 1.5;"></div>
        <div id="modal-calc" style="background: rgba(0,0,0,0.04); padding: 15px; border-radius: 12px; font-size: 14px; border: 1px solid rgba(0,0,0,0.08); line-height: 1.6;"></div>
    </div>
</div>

<div class="modal-overlay" id="import-modal">
    <div class="modal-card">
        <button class="modal-close" onclick="closeImportModal()">×</button>
        <h2 style="font-family:'Cinzel'; text-align:center; margin-bottom: 10px;">Importar Lenda</h2>
        <p style="font-size: 14px; text-align:center; color: var(--ink-light); margin-bottom: 15px;">Cole o código da sua Lenda abaixo para iniciar sua jornada.</p>
        <textarea id="import-code" placeholder="Cole o código Base64 aqui..."></textarea>
        <button class="btn btn-primary" onclick="confirmImport()" style="margin-top: 10px;">📥 CARREGAR LENDA</button>
    </div>
</div>

<script>
    const PERSONALITIES = {
        "O Boêmio (O Taverneiro)": "A vida é muito curta para não aproveitar. Corajoso quando bebe, tenta fazer amizade com quem não devia e é o alívio cômico do grupo.",
        "O Mercenário Frio": "Não move um dedo sem moedas de ouro envolvidas. A moralidade pouco importa, mas sempre cumpre seus contratos até o fim.",
        "O Rato de Masmorra": "A curiosidade vence o bom senso. Puxa alavancas e abre baús suspeitos. Acha grandes tesouros, mas ativa muitas armadilhas.",
        "O Galanteador": "Acredita que pode resolver qualquer conflito na lábia e no charme, desde guardas da cidade até dragões perigosos.",
        "O Sobrevivente Rabugento": "Reclama o tempo todo que a missão vai dar errado, mas na hora do aperto é o combatente mais leal e confiável do grupo.",
        "O Paranoico Cauteloso": "Acha que o universo tenta matá-lo. Cutuca o chão antes de pisar e não confia em NPCs bonzinhos.",
        "O Fervoroso Sanguinário": "Gosta demais da violência. Ignora planos furtivos para quebrar a porta da frente dando risada e puxando briga.",
        "O Escudo Humano": "O 'Paizão' do grupo. Sente-se responsável por todos e é o primeiro a se colocar na linha de frente para levar o dano pelos aliados.",
        "O Aristocrata Arrogante": "Acha que andar com aventureiros é caridade. Exige o melhor tratamento e tem nojo da sujeira, mas luta bem quando necessário.",
        "O Justiceiro Inflexível": "A lei e a honra acima de tudo. Não ataca pelas costas e não aceita subornos, o que costuma colocar o grupo em situações difíceis."
    };

    const CLASSES = {
        "Guerreiro": { mods: {FOR: 2, INT: -2, AGI: 0, VIT: 2, CAR: -1, SOR: -1}, skill: "Fúria Inabalável", cost: 10, desc: "Soma +2 aos dados 🎲 de ataque, +5 no dano causado ao HP ❤️, mas perde 5 de HP ❤️ (do personagem) por uso.", getDano: (stats) => `Dano ⚔️ TOTAL EXTRA: +${stats.FOR + 5} (Some aos dados 🎲)` },
        "Arqueiro": { mods: {FOR: -1, INT: 0, AGI: 2, VIT: -1, CAR: -1, SOR: 1}, skill: "Chuva de Flechas", cost: 15, desc: "Dano em área em todos os adversários, somando +1 aos dados 🎲 de ataque e +3 no dano causado ao HP ❤️ de cada um.", getDano: (stats) => `Dano 🏹 TOTAL EXTRA: +${stats.FOR + 3} em Área` },
        "Mago": { mods: {FOR: -2, INT: 3, AGI: -1, VIT: -1, CAR: 0, SOR: 1}, skill: "Colapso Arcano", cost: 20, desc: "Dano mágico 🔮 absurdo somando +10 no dano causado ao HP ❤️.", getDano: (stats) => `Dano Mágico 🔮 TOTAL EXTRA: +${stats.INT + 10} (Some aos dados 🎲)` },
        "Necromante": { mods: {FOR: 0, INT: 2, AGI: -1, VIT: 1, CAR: -2, SOR: 0}, skill: "Corrente de Almas", cost: 15, desc: "Revive um aliado caído com metade do HP ❤️ total.", getDano: (stats) => `Dano Mágico 🔮 Base: +${stats.INT}` },
        "Druida": { mods: {FOR: -1, INT: 1, AGI: -1, VIT: 1, CAR: -1, SOR: 1}, skill: "Metamorfose Selvagem", cost: 15, desc: "Vira uma fera somando +2 aos dados 🎲 de ataque e de defesa por 2 rodadas.", getDano: (stats) => `Dano 🐾 Base na Forma Fera: +${stats.FOR}` },
        "Soldado": { mods: {FOR: 1, INT: -1, AGI: 1, VIT: -1, CAR: 1, SOR: -1}, skill: "Formação de Falange", cost: 10, desc: "Aumenta a defesa dos aliados próximos em +2 nos dados 🎲 na próxima rodada.", getDano: (stats) => `Dano ⚔️ Físico Base: +${stats.FOR}` },
        "Assassino": { mods: {FOR: 0, INT: -1, AGI: 2, VIT: -2, CAR: -1, SOR: 2}, skill: "Golpe das Sombras", cost: 15, desc: "Dano triplo no HP ❤️ e veneno se bater furtivo (-1 HP ❤️ por rodada no adversário).", getDano: (stats) => `DANO TRIPLO SE FURTIVO 🗡️: Multiplique Bônus (+${stats.FOR}) por 3!` },
        "Bardo": { mods: {FOR: -2, INT: 1, AGI: -1, VIT: -1, CAR: 3, SOR: 0}, skill: "Canção da Fagulha", cost: 10, desc: "Dá bônus na equipe somando +2 nos dados 🎲 de ataque na próxima rodada.", getDano: (stats) => `Dano Mágico 🎶 Base: +${stats.INT}` }
    };

    const STAT_NAMES = { FOR: "Força", INT: "Inteligência", AGI: "Agilidade", VIT: "Vitalidade", CAR: "Carisma", SOR: "Sorte" };

    const ATTRIBUTE_HELP = {
        FOR: { desc: "Força bruta, usada para ataques físicos e carga.", calc: "1 pt = +1 Dano ⚔️ e +5kg na Carga 🏋️." },
        INT: { desc: "Poder mágico e reserva de mana.", calc: "1 pt = +1 Dano Mágico 🔮 e +2 MP 💎 Máximo." },
        AGI: { desc: "Velocidade de ataque e reflexos para esquiva.", calc: "1 pt = +1 Velocidade e +1 Esquiva." },
        VIT: { desc: "Resistência física total.", calc: "1 pt = +3 HP ❤️ Máximo." },
        CAR: { desc: "Lábia e negociação de preços.", calc: "Cada 2 pts = +1 Persuasão e 10% Desconto na Loja." },
        SOR: { desc: "Chance de golpes críticos e saque.", calc: "A cada 2 pts = Reduz 1 na margem de acerto crítico." }
    };

    let freePoints = 5;
    let allocated = { FOR: 0, INT: 0, AGI: 0, VIT: 0, CAR: 0, SOR: 0 };
    let characterData = {};

    function goToCreation() {
        document.getElementById('home-screen').classList.remove('active');
        document.getElementById('creation-screen').classList.add('active');
    }

    /* FUNÇÕES DE IMPORTAÇÃO */
    function openImportModal() {
        document.getElementById('import-code').value = '';
        document.getElementById('import-modal').classList.add('show');
    }

    function closeImportModal() {
        document.getElementById('import-modal').classList.remove('show');
    }

    function confirmImport() {
        let code = document.getElementById('import-code').value.trim();
        if (!code) {
            alert("⚠️ Por favor, cole um código válido!");
            return;
        }

        try {
            // Tenta decodificar o Base64 e o URI
            let decodedStr = decodeURIComponent(atob(code));
            let parsedData = JSON.parse(decodedStr);

            // Validação simples para ver se é mesmo um personagem nosso
            if (parsedData && parsedData.name && parsedData.cls) {
                localStorage.setItem('rpg_character', JSON.stringify(parsedData));
                alert(`✅ Lenda carregada com sucesso! Bem-vindo(a) de volta, ${parsedData.name}!`);
                window.location.href = 'commestre.html';
            } else {
                alert("⚠️ Código inválido. O formato dos dados não foi reconhecido.");
            }
        } catch (e) {
            alert("⚠️ Erro ao ler o código. Verifique se copiou o texto inteiro corretamente sem espaços extras.");
            console.error("Erro na importação:", e);
        }
    }

    function updatePersonality() {
        let p = document.getElementById('char-personality').value;
        document.getElementById('personality-panel').innerText = `"${PERSONALITIES[p]}"`;
    }

    function initStats() {
        const container = document.getElementById('stats-container');
        container.innerHTML = '';
        for (let stat in STAT_NAMES) {
            container.innerHTML += `
                <div class="stat-row">
                    <div class="stat-name" onclick="openAttributeModal('${stat}')">
                        ${STAT_NAMES[stat]} (${stat}) <span>❓</span>
                    </div>
                    <div class="stat-controls">
                        <button class="btn-gem" onclick="changeStat('${stat}', -1)">-</button>
                        <div class="stat-value" id="val-${stat}">0</div>
                        <button class="btn-gem" onclick="changeStat('${stat}', 1)">+</button>
                    </div>
                </div>
            `;
        }
        updatePersonality();
        updateUI();
    }

    function getCurrentStats() {
        let finalStats = {};
        for (let s in STAT_NAMES) finalStats[s] = getFinalStat(s);
        return finalStats;
    }

    function getFinalStat(stat) {
        let cls = document.getElementById('char-class').value;
        return 2 + (CLASSES[cls].mods[stat] || 0) + allocated[stat];
    }

    function changeStat(stat, delta) {
        if (delta === 1 && freePoints > 0) { 
            allocated[stat]++; 
            freePoints--; 
        } 
        // A mágica acontece aqui: só deixa subtrair se o jogador já tiver colocado algum ponto livre ali
        else if (delta === -1 && allocated[stat] > 0) { 
            allocated[stat]--; 
            freePoints++; 
        }
        updateUI();
    }

    function resetAndUpdate() {
        allocated = { FOR:0, INT:0, AGI:0, VIT:0, CAR:0, SOR:0 }; 
        freePoints = 5; 
        updateUI();
    }

    function updateUI() {
        document.getElementById('free-points-display').innerText = freePoints;

        for (let stat in STAT_NAMES) document.getElementById(`val-${stat}`).innerText = getFinalStat(stat);
        
        let cls = document.getElementById('char-class').value;
        let d = CLASSES[cls];
        let currentStats = getCurrentStats();
        
        let currentHP = 20 + (currentStats.VIT * 3);
        let currentMP = 15 + (currentStats.INT * 2);
        let currentCarga = 10 + (currentStats.FOR * 5);
        
        document.getElementById('class-details-panel').innerHTML = `
            <div style="text-align:center; font-family:'Cinzel', serif; font-size:18px; font-weight:bold; margin-bottom:10px;">${cls.toUpperCase()}</div>
            <div class="status-bar" style="margin-bottom:10px;">
                <span class="status-item" style="color:var(--gem-red);">HP: ${currentHP}</span> 
                <span style="color:var(--ink-light);">|</span>
                <span class="status-item" style="color:var(--gem-blue);">MP: ${currentMP}</span> 
                <span style="color:var(--ink-light);">|</span>
                <span class="status-item" style="color:#e65100;">⚖️ ${currentCarga}kg</span>
            </div>
            <p style="margin-bottom: 10px; text-align:center;"><strong>Bônus de Classe:</strong><br> ${Object.entries(d.mods).map(([s,v]) => `${s} ${v>0?'+'+v:v}`).join(', ')}</p>
            <hr style="border: 1px dashed rgba(0,0,0,0.1); margin: 15px 0;">
            <p style="margin-bottom: 5px; color:var(--gem-red);"><strong>🔥 ${d.skill} (${d.cost} MP)</strong></p>
            <p style="font-size: 13px; margin-top: 0;">${d.desc}</p>
        `;
    }

    function openAttributeModal(stat) {
        let finalValue = getFinalStat(stat);
        let cls = document.getElementById('char-class').value;
        
        document.getElementById('modal-title').innerText = `${STAT_NAMES[stat]} (${stat})`;
        document.getElementById('modal-desc').innerText = ATTRIBUTE_HELP[stat].desc;
        document.getElementById('modal-calc').innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>Valor Base Universal:</span> <strong>2</strong></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>Modificador (${cls}):</span> <strong>${CLASSES[cls].mods[stat] || 0}</strong></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>Pontos Distribuídos:</span> <strong>${allocated[stat]}</strong></div>
            <hr style="border:1px dashed rgba(0,0,0,0.1); margin: 10px 0;">
            <div style="font-size:18px; text-align:center; color:var(--gem-blue);"><strong>TOTAL: ${finalValue}</strong></div>
            <div style="text-align:center; color: var(--ink); font-weight: bold; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 8px; margin-top:10px;">${ATTRIBUTE_HELP[stat].calc}</div>
        `;
        document.getElementById('attribute-modal').classList.add('show');
    }

    function closeAttributeModal() { document.getElementById('attribute-modal').classList.remove('show'); }

    /* FUNÇÕES DO MENU FLUTUANTE */
    function toggleFabMenu() {
        const options = document.getElementById('fab-options');
        const overlay = document.getElementById('fab-overlay');
        const btn = document.getElementById('fab-main-btn');
        
        if (options.classList.contains('open')) {
            options.classList.remove('open');
            overlay.classList.remove('show');
            btn.innerHTML = '📜 OPÇÕES DA LENDA';
        } else {
            options.classList.add('open');
            overlay.classList.add('show');
            btn.innerHTML = '❌ FECHAR OPÇÕES';
        }
    }

    function goBack() {
        toggleFabMenu(); 
        document.getElementById('summary-screen').classList.remove('active');
        document.getElementById('creation-screen').classList.add('active');
    }

    function generateSummary() {
        let nameInput = document.getElementById('char-name').value.trim();
        if (!nameInput) {
            alert("⚠️ Por favor, dê um nome para a sua Lenda antes de continuar!");
            document.getElementById('char-name').focus();
            return;
        }
        if (freePoints > 0) return alert(`⚠️ Você ainda tem ${freePoints} ponto(s) livre(s). Distribua todos os pontos antes de gerar a ficha!`);

        let cls = document.getElementById('char-class').value;
        let personality = document.getElementById('char-personality').value;
        let personalityDesc = PERSONALITIES[personality];
        let finalStats = getCurrentStats();

        let hp = 20 + (finalStats.VIT * 3);
        let mp = 15 + (finalStats.INT * 2);
        let carga = 10 + (finalStats.FOR * 5);
        let crit = 20 - Math.floor(finalStats.SOR / 2);
        let labia = Math.floor(finalStats.CAR / 2);
        
        let clsData = CLASSES[cls];

        characterData = {
            name: nameInput, cls, personality, personalityDesc, finalStats,
            hp, maxHp: hp, mp, maxMp: mp, carga, crit, labia,
            skill: clsData.skill, cost: clsData.cost, desc: clsData.desc,
            danoPronto: clsData.getDano(finalStats),
            
            // Variáveis de inicialização pro commestre.html
            level: 1, exp: 0, maxLevelReached: 1, freePoints: 0,
            gold: 0, notes: "", isDead: false,
            inventory: [], buffs: [], hots: [], history: [],

            descFOR: `+${finalStats.FOR} somado aos dados 🎲 de ataque e +${finalStats.FOR * 5}kg de Carga 🏋️.`,
            descINT: `+${finalStats.INT} somado ao Dano Mágico 🔮 e +${finalStats.INT * 2} de MP base.`,
            descAGI: `+${finalStats.AGI} na velocidade de ataque e +${finalStats.AGI} na esquiva.`,
            descVIT: `+${finalStats.VIT * 3} HP somados aos 20 iniciais.`,
            descCAR: `+${labia} em persuasão e ${labia * 10}% de desconto.`,
            descSOR: `Acerto Crítico tirando ${crit} ou mais no dado 🎲. +${finalStats.SOR} no saque de baús.`
        };

        let d = characterData;
        let cardHTML = `
            <div class="summary-header">
                <h2 class="summary-name">${d.name}</h2>
                <div class="summary-details">${d.cls} | ${d.personality}</div>
                <div class="summary-personality-quote">"${d.personalityDesc}"</div>
            </div>
            
            <div class="status-bar">
                <span class="status-item" style="color:var(--gem-red);">❤️ HP: ${d.hp}</span>
                <span style="color:var(--ink-light);">|</span>
                <span class="status-item" style="color:var(--gem-blue);">💎 MP: ${d.mp}</span>
                <span style="color:var(--ink-light);">|</span>
                <span class="status-item" style="color:#e65100;">⚖️ Carga: ${d.carga}kg</span>
            </div>

            <div style="background:rgba(0,0,0,0.03); border:1px dashed rgba(0,0,0,0.1); padding:12px; margin-bottom:20px; text-align:center; border-radius:12px; font-weight:bold; font-size:14px;">
                🎒 Inventário Inicial: Roupas Comuns (+0 Defesa)
            </div>

            <h3 style="margin-bottom: 15px; font-size:18px;">Atributos Base</h3>
            
            <div class="attr-box"><div class="attr-title">💪 Força: ${d.finalStats.FOR}</div><div class="attr-desc">${d.descFOR}</div></div>
            <div class="attr-box"><div class="attr-title">🧠 Inteligência: ${d.finalStats.INT}</div><div class="attr-desc">${d.descINT}</div></div>
            <div class="attr-box"><div class="attr-title">⚡ Agilidade: ${d.finalStats.AGI}</div><div class="attr-desc">${d.descAGI}</div></div>
            <div class="attr-box"><div class="attr-title">❤️ Vitalidade: ${d.finalStats.VIT}</div><div class="attr-desc">${d.descVIT}</div></div>
            <div class="attr-box"><div class="attr-title">🗣️ Carisma: ${d.finalStats.CAR}</div><div class="attr-desc">${d.descCAR}</div></div>
            <div class="attr-box"><div class="attr-title">🍀 Sorte: ${d.finalStats.SOR}</div><div class="attr-desc">${d.descSOR}</div></div>

            <div class="summary-skill">
                <span class="summary-skill-title">🔥 ${d.skill} (${d.cost} MP)</span>
                ${d.desc}<br><br>
                <div style="background:rgba(255,255,255,0.1); color:var(--gold); padding:8px; font-weight:bold; display:inline-block; border-radius:8px; border:1px solid rgba(212,175,55,0.3); font-size:13px;">${d.danoPronto}</div>
            </div>
        `;

        document.getElementById('card-content').innerHTML = cardHTML;
        document.getElementById('creation-screen').classList.remove('active');
        document.getElementById('summary-screen').classList.add('active');
    }

    async function exportCode() {
        toggleFabMenu();
        // Converte o JSON em Base64
        let code = btoa(encodeURIComponent(JSON.stringify(characterData)));
        
        let shareText = `🛡️ *LENDA DO RPG*\nNome: ${characterData.name}\nClasse: ${characterData.cls}\n\n*Cole o código abaixo para importar:*\n\n${code}`;

        // Tenta usar o compartilhamento nativo do celular
        if (navigator.share) {
            try {
                await navigator.share({
                    title: `Código da Lenda: ${characterData.name}`,
                    text: shareText
                });
            } catch (err) {
                console.log("Compartilhamento cancelado ou não suportado", err);
            }
        } else {
            // Fallback para quem está no PC ou navegador antigo
            navigator.clipboard.writeText(code).then(() => {
                alert("✅ Código da lenda copiado para a área de transferência! Cole onde desejar salvar.");
            }).catch(() => {
                prompt("Seu navegador não suporta cópia automática. Copie o código abaixo:", code);
            });
        }
    }

    function sendWhatsApp() {
        toggleFabMenu();
        let d = characterData;
        let text = `🛡️ *NOVA LENDA CHEGOU À MESA!* 🛡️\n\n`;
        text += `👤 *Nome:* ${d.name}\n`;
        text += `🐉 *Classe:* ${d.cls}\n`;
        text += `🎭 *Personalidade:* ${d.personality}\n`;
        text += `_"${d.personalityDesc}"_\n\n`;
        text += `❤️ *HP:* ${d.hp} / ${d.hp}\n`;
        text += `💎 *MP:* ${d.mp} / ${d.mp}\n`;
        text += `🏋️ *Carga:* ${d.carga} kg\n`;
        text += `🎒 *Equipamento:* Roupas Comuns (0 Defesa)\n\n`;
        
        text += `📊 *ATRIBUTOS NA PRÁTICA:*\n`;
        text += `💪 *FOR (${d.finalStats.FOR}):* ${d.descFOR}\n\n`;
        text += `🧠 *INT (${d.finalStats.INT}):* ${d.descINT}\n\n`;
        text += `⚡ *AGI (${d.finalStats.AGI}):* ${d.descAGI}\n\n`;
        text += `❤️ *VIT (${d.finalStats.VIT}):* ${d.descVIT}\n\n`;
        text += `🗣️ *CAR (${d.finalStats.CAR}):* ${d.descCAR}\n\n`;
        text += `🍀 *SOR (${d.finalStats.SOR}):* ${d.descSOR}\n\n`;
        
        text += `🔥 *HABILIDADE ESPECIAL:*\n`;
        text += `*${d.skill}* (Custo: ${d.cost} MP 💎)\n_${d.desc}_\n`;
        text += `👉 *${d.danoPronto}*`;

        let zapLink = `whatsapp://send?text=${encodeURIComponent(text)}`;
        window.location.href = zapLink;
    }

    function startGame() {
        localStorage.setItem('rpg_character', JSON.stringify(characterData));
        window.location.href = 'commestre.html';
    }

    window.onload = function() { initStats(); resetAndUpdate(); };
</script>
