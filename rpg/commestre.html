<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Novais LAB | Mudamos de Endereço</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230047ab'/%3E%3Ctext x='50' y='65' font-family='Inter, sans-serif' font-size='45' font-weight='800' fill='%23ffffff' text-anchor='middle'%3EAN%3C/text%3E%3C/svg%3E">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; /* Dark Mode profundo */
            --card: #1e293b;
            --text: #f8fafc;
            --blue-mica: #0047ab; /* Cor oficial Alan Novais */
            --blue-hover: #1e40af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            text-align: center;
        }

        .container {
            background-color: var(--card);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 450px;
            border: 1px solid #334155;
        }

        .logo-badge {
            background-color: var(--blue-mica);
            color: white;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.8rem; margin-bottom: 15px; }
        p { color: #94a3b8; margin-bottom: 30px; line-height: 1.5; }

        .btn {
            background-color: var(--blue-mica);
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: var(--blue-hover);
            transform: scale(1.05);
        }

        #timer { font-weight: 800; color: var(--blue-mica); }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-badge">ALAN NOVAIS LAB</div>
        <h1>Estamos de Casa Nova!</h1>
        <p>O sistema agora está centralizado na Vercel para melhor performance e recursos.</p>
        
        <a href="https://alannovais.vercel.app" class="btn">Ir para o Novo Site</a>

        <p style="margin-top: 30px; font-size: 0.85rem;">
            Você será redirecionado automaticamente em <span id="timer">5</span> segundos...
        </p>
    </div>

    <script>
        let timeLeft = 5;
        const timerElement = document.getElementById('timer');
        const targetUrl = "https://alannovais.vercel.app";

        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = targetUrl;
            }
        }, 1000);
    </script>
</body>
</html>
