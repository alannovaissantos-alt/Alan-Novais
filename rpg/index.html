<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG - Crie sua Lenda</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Merriweather:wght@400;700;900&display=swap');

        :root {
            --bg-dark: #1e150e;
            --parchment: #f4e8c1;
            --parchment-dark: #e3d2a8;
            --ink: #3e2723;
            --ink-light: #5d4037;
            --gem-red: #8b0000;
            --gem-blue: #0055a4;
            --gold: #b8860b;
            --gold-light: #dfb12e;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle, #2a1e14 0%, #110b07 100%);
            color: var(--parchment);
            font-family: 'Merriweather', serif;
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh;
        }

        .container {
            background-color: var(--parchment); color: var(--ink); width: 100%; max-width: 450px;
            padding: 25px; border: 4px solid var(--ink-light); border-radius: 10px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1), 0 10px 30px rgba(0,0,0,0.8); position: relative;
            box-sizing: border-box;
        }

        .container::before, .container::after {
            content: ''; position: absolute; border: 2px solid var(--gold); width: 20px; height: 20px;
        }
        .container::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .container::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        h1 { font-family: 'Cinzel', serif; text-align: center; color: var(--ink); border-bottom: 2px solid var(--ink-light); padding-bottom: 10px; font-size: 30px; margin-top: 0; }
        
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 16px; }

        input[type="text"], select {
            width: 100%; padding: 12px; margin-top: 5px; background-color: var(--parchment-dark);
            border: 1px solid var(--ink-light); color: var(--ink); font-family: 'Merriweather', serif;
            font-size: 16px; font-weight: bold; box-sizing: border-box; border-radius: 4px;
        }

        .info-panel {
            background-color: var(--parchment-dark); border: 2px solid var(--gold); padding: 15px;
            margin-top: 10px; border-radius: 5px; font-size: 14px; line-height: 1.5;
        }

        .info-header { font-family: 'Cinzel', serif; font-size: 18px; margin-bottom: 5px; text-align: center; color: var(--ink); }
        .live-stats { text-align: center; font-weight: bold; background-color: var(--ink); color: var(--parchment); padding: 5px; border-radius: 4px; margin-bottom: 10px; font-family: 'Cinzel', serif; font-size: 15px; }

        .points-box { text-align: center; background-color: var(--ink); color: var(--gold); padding: 12px; margin: 20px 0; border-radius: 5px; font-size: 20px; font-family: 'Cinzel', serif; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px dashed var(--ink-light); padding-bottom: 8px; }
        .stat-name { font-weight: bold; font-size: 16px; flex-grow: 1; cursor: pointer; color: var(--ink); transition: color 0.2s; }
        .stat-name:hover { color: var(--gold-light); }
        .stat-name span { font-size: 12px; vertical-align: super; }

        .stat-controls { display: flex; align-items: center; gap: 15px; }
        .btn-gem { background-color: var(--ink); color: var(--parchment); border: 2px solid var(--gold); width: 35px; height: 35px; border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: inset 0 -3px 5px rgba(0,0,0,0.5), 0 4px 6px rgba(0,0,0,0.4); transition: all 0.1s; display: flex; align-items: center; justify-content: center; padding: 0;}
        .btn-gem:active { transform: translateY(3px); box-shadow: inset 0 3px 5px rgba(0,0,0,0.8); }
        .stat-value { font-size: 20px; font-weight: bold; width: 30px; text-align: center; }

        .btn-primary {
            width: 100%; padding: 15px; background-color: var(--ink); color: var(--gold);
            border: 2px solid var(--gold); font-family: 'Cinzel', serif; font-size: 18px;
            font-weight: bold; margin-top: 25px; cursor: pointer; border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: transform 0.1s; box-sizing: border-box;
        }
        .btn-primary:active { transform: translateY(2px); }

        /* Modal Pop-up */
        #attribute-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background-color: var(--parchment); border: 4px solid var(--gold); border-radius: 8px; padding: 20px; width: 100%; max-width: 320px; position: relative; color: var(--ink); font-family: 'Merriweather', serif; box-sizing: border-box; }
        .modal-header { font-family: 'Cinzel', serif; font-size: 20px; text-align: center; margin-bottom: 10px; border-bottom: 1px solid var(--gold); padding-bottom: 5px; }
        .modal-close { background-color: var(--gem-red); color: white; border: 2px solid var(--ink); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; position: absolute; top: -15px; right: -15px; display: flex; justify-content: center; align-items: center; font-weight: bold; padding: 0;}

        /* Tela de Resumo / Ficha Técnica */
        #summary-screen { display: none; width: 100%; }
        .summary-card { background-color: #fbf2db; border: 2px solid var(--ink); padding: 25px 20px; margin-bottom: 20px; border-radius: 6px; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); box-sizing: border-box; }
        
        .summary-header { text-align: center; margin-bottom: 20px; }
        .summary-name { 
            font-size: 32px; 
            margin-bottom: 5px; 
            color: var(--ink); 
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.15);
        }
        .summary-details { font-size: 16px; color: var(--ink-light); font-style: italic; margin-top: 5px; }
        .summary-personality-quote {
            font-size: 14px; margin: 20px auto; color: var(--ink); padding: 12px 15px;
            font-style: italic; background-color: rgba(0,0,0,0.04); border-left: 3px solid var(--gold);
            border-right: 3px solid var(--gold); border-radius: 4px; line-height: 1.4;
        }

        /* Status Bar com Flexbox anti-quebra */
        .status-bar { 
            display: flex; flex-wrap: wrap; justify-content: space-around; gap: 10px;
            background-color: var(--ink); color: var(--parchment); padding: 12px; 
            border-radius: 5px; margin-bottom: 25px; font-weight: bold; font-family: 'Cinzel', serif; font-size: 15px; 
        }
        .status-item {
            white-space: nowrap; /* Impede quebra no meio da informação */
            text-align: center;
        }

        .attr-box { background-color: var(--parchment-dark); border: 1px solid var(--ink-light); padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .attr-title { font-weight: bold; font-size: 16px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 4px; margin-bottom: 4px;}
        .attr-desc { font-size: 13px; color: var(--ink-light); line-height: 1.4; }
        
        .summary-skill { background-color: var(--ink); color: var(--parchment); padding: 15px; border-left: 5px solid var(--gem-red); font-size: 14px; margin-top: 25px; border-radius: 0 4px 4px 0; }
        .summary-skill-title { color: var(--gold); font-size: 16px; font-family: 'Cinzel', serif; font-weight: bold; margin-bottom: 8px; display: block; }

        /* MENU FLUTUANTE (FAB) */
        .fab-wrapper { position: relative; width: 100%; z-index: 20; }
        .fab-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 15; opacity: 0; transition: opacity 0.3s;
        }
        .fab-overlay.show { display: block; opacity: 1; }
        
        .fab-options {
            position: absolute; bottom: 70px; left: 0; width: 100%; display: flex; flex-direction: column;
            gap: 12px; opacity: 0; pointer-events: none; transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20; box-sizing: border-box;
        }
        .fab-options.open { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
        
        .fab-btn {
            width: 100%; padding: 12px; border-radius: 8px; font-family: 'Cinzel', serif; font-size: 15px;
            font-weight: bold; cursor: pointer; border: 2px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; gap: 8px; box-sizing: border-box;
        }
        .fab-btn:active { transform: translateY(2px); }

        .btn-green { background-color: #0b5f3a; color: white; border-color: #128C7E; }
        .btn-blue { background-color: #0055a4; color: white; border-color: #003366; }
        .btn-red { background-color: var(--gem-red); color: white; border-color: #4a0000; }
        .btn-yellow { background-color: #d4af37; color: var(--ink); border-color: var(--ink); font-weight: 800; }
        
    </style>
</head>
<body>

<div class="container" id="app">
    
    <div id="creation-screen">
        <h1>Crie sua Lenda</h1>
        
        <label>Nome do Personagem:</label>
        <input type="text" id="char-name" placeholder="Ex: Aragorn">

        <label>Personalidade:</label>
        <select id="char-personality" onchange="updatePersonality()">
            <option value="O Boêmio (O Taverneiro)">O Boêmio (O Taverneiro)</option>
            <option value="O Mercenário Frio">O Mercenário Frio</option>
            <option value="O Rato de Masmorra">O Rato de Masmorra</option>
            <option value="O Galanteador">O Galanteador</option>
            <option value="O Sobrevivente Rabugento">O Sobrevivente Rabugento</option>
            <option value="O Paranoico Cauteloso">O Paranoico Cauteloso</option>
            <option value="O Fervoroso Sanguinário">O Fervoroso Sanguinário</option>
            <option value="O Escudo Humano">O Escudo Humano</option>
            <option value="O Aristocrata Arrogante">O Aristocrata Arrogante</option>
            <option value="O Justiceiro Inflexível">O Justiceiro Inflexível</option>
        </select>
        <div id="personality-panel" class="info-panel" style="font-style: italic; text-align: center;"></div>

        <label>Classe:</label>
        <select id="char-class" onchange="resetAndUpdate()">
            <option value="Guerreiro">Guerreiro</option>
            <option value="Arqueiro">Arqueiro</option>
            <option value="Mago">Mago</option>
            <option value="Necromante">Necromante</option>
            <option value="Druida">Druida</option>
            <option value="Soldado">Soldado</option>
            <option value="Assassino">Assassino</option>
            <option value="Bardo">Bardo</option>
        </select>

        <div id="class-details-panel" class="info-panel"></div>

        <div class="points-box">
            Pontos Livres: <span id="free-points-display">5</span>
        </div>

        <div id="stats-container"></div>

        <button class="btn-primary" onclick="generateSummary()">📜 GERAR FICHA TÉCNICA</button>
    </div>

    <div id="summary-screen">
        <h1 style="margin-bottom: 20px;">Sua Ficha Técnica</h1>
        <div class="summary-card" id="card-content"></div>
        
        <div class="fab-overlay" id="fab-overlay" onclick="toggleFabMenu()"></div>
        <div class="fab-wrapper">
            <div class="fab-options" id="fab-options">
                <button class="fab-btn btn-green" onclick="sendWhatsApp()">📲 ENVIAR NO WHATSAPP</button>
                <button class="fab-btn btn-blue" onclick="startGame('com_mestre')">🎲 JOGAR COM MESTRE</button>
                <button class="fab-btn btn-red" onclick="startGame('sem_mestre')">🤖 JOGAR SEM MESTRE (v2.0)</button>
                <button class="fab-btn btn-yellow" onclick="goBack()">⬅️ VOLTAR E EDITAR</button>
            </div>
            <button class="btn-primary" id="fab-main-btn" onclick="toggleFabMenu()">📜 ESCOLHER DESTINO</button>
        </div>
    </div>

</div>

<div id="attribute-modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeAttributeModal()">X</button>
        <div id="modal-title" class="modal-header"></div>
        <div id="modal-desc" style="font-size: 14px; margin-bottom: 15px;"></div>
        <div id="modal-calc" style="background-color: var(--parchment-dark); padding: 10px; border-radius: 4px; font-size: 14px; border: 1px solid var(--ink-light);"></div>
    </div>
</div>

<script>
    const PERSONALITIES = {
        "O Boêmio (O Taverneiro)": "A vida é muito curta para não aproveitar. Corajoso quando bebe, tenta fazer amizade com quem não devia e é o alívio cômico do grupo.",
        "O Mercenário Frio": "Não move um dedo sem moedas de ouro envolvidas. A moralidade pouco importa, mas sempre cumpre seus contratos até o fim.",
        "O Rato de Masmorra": "A curiosidade vence o bom senso. Puxa alavancas e abre baús suspeitos. Acha grandes tesouros, mas ativa muitas armadilhas.",
        "O Galanteador": "Acredita que pode resolver qualquer conflito na lábia e no charme, desde guardas da cidade até dragões perigosos.",
        "O Sobrevivente Rabugento": "Reclama o tempo todo que a missão vai dar errado, mas na hora do aperto é o combatente mais leal e confiável do grupo.",
        "O Paranoico Cauteloso": "Acha que o universo tenta matá-lo. Cutuca o chão antes de pisar e não confia em NPCs bonzinhos.",
        "O Fervoroso Sanguinário": "Gosta demais da violência. Ignora planos furtivos para quebrar a porta da frente dando risada e puxando briga.",
        "O Escudo Humano": "O 'Paizão' do grupo. Sente-se responsável por todos e é o primeiro a se colocar na linha de frente para levar o dano pelos aliados.",
        "O Aristocrata Arrogante": "Acha que andar com aventureiros é caridade. Exige o melhor tratamento e tem nojo da sujeira, mas luta bem quando necessário.",
        "O Justiceiro Inflexível": "A lei e a honra acima de tudo. Não ataca pelas costas e não aceita subornos, o que costuma colocar o grupo em situações difíceis."
    };

    const CLASSES = {
        "Guerreiro": { mods: {FOR: 2, INT: -2, AGI: 0, VIT: 2, CAR: -1, SOR: -1}, skill: "Fúria Inabalável", cost: 10, desc: "Soma +2 aos dados 🎲 de ataque, +5 no dano causado ao HP ❤️, mas perde 5 de HP ❤️ (do personagem) por uso.", getDano: (stats) => `Dano ⚔️ TOTAL EXTRA: +${stats.FOR + 5} (Some aos dados 🎲)` },
        "Arqueiro": { mods: {FOR: -1, INT: 0, AGI: 2, VIT: -1, CAR: -1, SOR: 1}, skill: "Chuva de Flechas", cost: 15, desc: "Dano em área em todos os adversários, somando +1 aos dados 🎲 de ataque e +3 no dano causado ao HP ❤️ de cada um.", getDano: (stats) => `Dano 🏹 TOTAL EXTRA: +${stats.FOR + 3} em Área` },
        "Mago": { mods: {FOR: -2, INT: 3, AGI: -1, VIT: -1, CAR: 0, SOR: 1}, skill: "Colapso Arcano", cost: 20, desc: "Dano mágico 🔮 absurdo somando +10 no dano causado ao HP ❤️.", getDano: (stats) => `Dano Mágico 🔮 TOTAL EXTRA: +${stats.INT + 10} (Some aos dados 🎲)` },
        "Necromante": { mods: {FOR: 0, INT: 2, AGI: -1, VIT: 1, CAR: -2, SOR: 0}, skill: "Corrente de Almas", cost: 15, desc: "Revive um aliado caído com metade do HP ❤️ total.", getDano: (stats) => `Dano Mágico 🔮 Base: +${stats.INT}` },
        "Druida": { mods: {FOR: -1, INT: 1, AGI: -1, VIT: 1, CAR: -1, SOR: 1}, skill: "Metamorfose Selvagem", cost: 15, desc: "Vira uma fera somando +2 aos dados 🎲 de ataque e de defesa por 2 rodadas.", getDano: (stats) => `Dano 🐾 Base na Forma Fera: +${stats.FOR}` },
        "Soldado": { mods: {FOR: 1, INT: -1, AGI: 1, VIT: -1, CAR: 1, SOR: -1}, skill: "Formação de Falange", cost: 10, desc: "Aumenta a defesa dos aliados próximos em +2 nos dados 🎲 na próxima rodada.", getDano: (stats) => `Dano ⚔️ Físico Base: +${stats.FOR}` },
        "Assassino": { mods: {FOR: 0, INT: -1, AGI: 2, VIT: -2, CAR: -1, SOR: 2}, skill: "Golpe das Sombras", cost: 15, desc: "Dano triplo no HP ❤️ e veneno se bater furtivo (-1 HP ❤️ por rodada no adversário).", getDano: (stats) => `DANO TRIPLO SE FURTIVO 🗡️: Multiplique dados 🎲 e Bônus (+${stats.FOR}) por 3!` },
        "Bardo": { mods: {FOR: -2, INT: 1, AGI: -1, VIT: -1, CAR: 3, SOR: 0}, skill: "Canção da Fagulha", cost: 10, desc: "Dá bônus na equipe somando +2 nos dados 🎲 de ataque na próxima rodada.", getDano: (stats) => `Dano Mágico 🎶 Base: +${stats.INT}` }
    };

    const STAT_NAMES = { FOR: "Força", INT: "Inteligência", AGI: "Agilidade", VIT: "Vitalidade", CAR: "Carisma", SOR: "Sorte" };

    const ATTRIBUTE_HELP = {
        FOR: { desc: "Força bruta, usada para ataques físicos e carga.", calc: "1 pt = +1 Dano ⚔️ e +5kg na Carga 🏋️." },
        INT: { desc: "Poder mágico e reserva de mana.", calc: "1 pt = +1 Dano Mágico 🔮 e +2 MP 💎 Máximo." },
        AGI: { desc: "Velocidade de ataque e reflexos para esquiva.", calc: "1 pt = +1 Velocidade e +1 Esquiva." },
        VIT: { desc: "Resistência física total.", calc: "1 pt = +3 HP ❤️ Máximo." },
        CAR: { desc: "Lábia e negociação de preços.", calc: "Cada 2 pts = +1 Persuasão e 10% Desconto na Loja." },
        SOR: { desc: "Chance de golpes críticos e saque.", calc: "1 pt = Reduz margem de acerto crítico e soma no dado 🎲 de baú." }
    };

    let freePoints = 5;
    let allocated = { FOR: 0, INT: 0, AGI: 0, VIT: 0, CAR: 0, SOR: 0 };
    let characterData = {};

    function updatePersonality() {
        let p = document.getElementById('char-personality').value;
        document.getElementById('personality-panel').innerText = `"${PERSONALITIES[p]}"`;
    }

    function initStats() {
        const container = document.getElementById('stats-container');
        container.innerHTML = '';
        for (let stat in STAT_NAMES) {
            container.innerHTML += `
                <div class="stat-row">
                    <div class="stat-name" onclick="openAttributeModal('${stat}')">
                        ${STAT_NAMES[stat]} (${stat}) <span>ℹ️</span>
                    </div>
                    <div class="stat-controls">
                        <button class="btn-gem" onclick="changeStat('${stat}', -1)">-</button>
                        <div class="stat-value" id="val-${stat}">0</div>
                        <button class="btn-gem" onclick="changeStat('${stat}', 1)">+</button>
                    </div>
                </div>
            `;
        }
        updatePersonality();
        updateUI();
    }

    function getCurrentStats() {
        let finalStats = {};
        for (let s in STAT_NAMES) finalStats[s] = getFinalStat(s);
        return finalStats;
    }

    function getFinalStat(stat) {
        let cls = document.getElementById('char-class').value;
        return 2 + (CLASSES[cls].mods[stat] || 0) + allocated[stat];
    }

    function changeStat(stat, delta) {
        let finalValue = getFinalStat(stat);
        if (delta === 1 && freePoints > 0) { allocated[stat]++; freePoints--; } 
        else if (delta === -1 && finalValue > 0) { allocated[stat]--; freePoints++; }
        updateUI();
    }

    function resetAndUpdate() {
        allocated = { FOR:0, INT:0, AGI:0, VIT:0, CAR:0, SOR:0 }; 
        freePoints = 5; 
        updateUI();
    }

    function updateUI() {
        document.getElementById('free-points-display').innerText = freePoints;

        for (let stat in STAT_NAMES) document.getElementById(`val-${stat}`).innerText = getFinalStat(stat);
        
        let cls = document.getElementById('char-class').value;
        let d = CLASSES[cls];
        let currentStats = getCurrentStats();
        
        let currentHP = 20 + (currentStats.VIT * 3);
        let currentMP = 15 + (currentStats.INT * 2);
        let currentCarga = 10 + (currentStats.FOR * 5);
        
        document.getElementById('class-details-panel').innerHTML = `
            <div class="class-details-header">${cls.toUpperCase()}</div>
            <div class="live-stats" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;">
                <span style="white-space:nowrap;">HP ❤️: ${currentHP}</span> | 
                <span style="white-space:nowrap;">MP 💎: ${currentMP}</span> | 
                <span style="white-space:nowrap;">Carga 🏋️: ${currentCarga}kg</span>
            </div>
            <p style="margin-bottom: 10px;"><strong>Bônus:</strong> ${Object.entries(d.mods).map(([s,v]) => `${s} ${v>0?'+'+v:v}`).join(', ')}</p>
            <hr style="border: 1px dashed var(--gold); margin: 10px 0;">
            <p style="margin-bottom: 5px;"><strong>🔥 HABILIDADE: ${d.skill} (${d.cost} MP 💎)</strong></p>
            <p style="font-size: 13px; margin-top: 0;">${d.desc}</p>
            <div style="background:var(--ink);color:var(--gold);padding:6px;border-radius:4px;font-weight:bold;font-size:13px;margin-top:8px;display:inline-block;">${d.getDano(currentStats)}</div>
        `;
    }

    function openAttributeModal(stat) {
        let finalValue = getFinalStat(stat);
        let cls = document.getElementById('char-class').value;
        
        document.getElementById('modal-title').innerText = `${STAT_NAMES[stat]} (${stat})`;
        document.getElementById('modal-desc').innerText = ATTRIBUTE_HELP[stat].desc;
        document.getElementById('modal-calc').innerHTML = `
            <p>Valor Base Universal: 2</p>
            <p>Modificador (${cls}): ${CLASSES[cls].mods[stat] || 0}</p>
            <p>Pontos Livres Gastos/Retirados: ${allocated[stat]}</p>
            <hr style="border:1px dashed var(--ink-light); margin: 10px 0;">
            <p style="font-size:16px; text-align:center;"><strong>TOTAL: ${finalValue}</strong></p>
            <p style="text-align:center; color: var(--ink); font-weight: bold; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 4px;">${ATTRIBUTE_HELP[stat].calc}</p>
        `;
        document.getElementById('attribute-modal').style.display = 'flex';
    }

    function closeAttributeModal() { document.getElementById('attribute-modal').style.display = 'none'; }

    /* FUNÇÕES DO MENU FLUTUANTE */
    function toggleFabMenu() {
        const options = document.getElementById('fab-options');
        const overlay = document.getElementById('fab-overlay');
        const btn = document.getElementById('fab-main-btn');
        
        if (options.classList.contains('open')) {
            options.classList.remove('open');
            overlay.classList.remove('show');
            btn.innerHTML = '📜 ESCOLHER DESTINO';
        } else {
            options.classList.add('open');
            overlay.classList.add('show');
            btn.innerHTML = '❌ FECHAR OPÇÕES';
        }
    }

    function goBack() {
        toggleFabMenu(); // Fecha o menu flutuante
        document.getElementById('summary-screen').style.display = 'none';
        document.getElementById('creation-screen').style.display = 'block';
    }

    function generateSummary() {
        let nameInput = document.getElementById('char-name').value.trim();
        if (!nameInput) return alert("⚠️ Por favor, dê um nome para a sua Lenda antes de continuar!");
        if (freePoints > 0) return alert(`⚠️ Você ainda tem ${freePoints} ponto(s) livre(s). Distribua todos os pontos antes de gerar a ficha!`);

        let cls = document.getElementById('char-class').value;
        let personality = document.getElementById('char-personality').value;
        let personalityDesc = PERSONALITIES[personality];
        let finalStats = getCurrentStats();

        let hp = 20 + (finalStats.VIT * 3);
        let mp = 15 + (finalStats.INT * 2);
        let carga = 10 + (finalStats.FOR * 5);
        let crit = 20 - finalStats.SOR;
        let labia = Math.floor(finalStats.CAR / 2);
        
        let clsData = CLASSES[cls];

        characterData = {
            name: nameInput, cls, personality, personalityDesc, finalStats,
            hp, mp, carga, crit, labia,
            skill: clsData.skill, cost: clsData.cost, desc: clsData.desc,
            danoPronto: clsData.getDano(finalStats),
            
            descFOR: `+${finalStats.FOR} somado aos dados 🎲 de ataque e +${finalStats.FOR * 5}kg de Carga 🏋️.`,
            descINT: `+${finalStats.INT} somado ao Dano Mágico 🔮 e +${finalStats.INT * 2} de MP 💎 base.`,
            descAGI: `+${finalStats.AGI} na velocidade de ataque e +${finalStats.AGI} na esquiva.`,
            descVIT: `+${finalStats.VIT * 3} HP ❤️ somados aos 20 iniciais.`,
            descCAR: `+${labia} em persuasão e ${labia * 10}% de desconto.`,
            descSOR: `Acerto Crítico tirando ${crit} ou mais no dado 🎲. +${finalStats.SOR} no saque de baús.`
        };

        let d = characterData;
        let cardHTML = `
            <div class="summary-header">
                <h2 class="summary-name">${d.name}</h2>
                <div class="summary-details">${d.cls} | ${d.personality}</div>
                <div class="summary-personality-quote">"${d.personalityDesc}"</div>
            </div>
            
            <div class="status-bar">
                <div class="status-item">HP ❤️: ${d.hp}</div>
                <div class="status-item">MP 💎: ${d.mp}</div>
                <div class="status-item">Carga 🏋️: ${d.carga}kg</div>
            </div>

            <div style="background:var(--parchment-dark); border:1px dashed var(--ink-light); padding:10px; margin-bottom:20px; text-align:center; border-radius:4px; font-weight:bold;">
                🎒 Inventário Inicial: Roupas Comuns (+0 Defesa)
            </div>

            <h3 style="margin-bottom: 15px; font-size:18px;">Atributos Base</h3>
            
            <div class="attr-box"><div class="attr-title">Força 💪: ${d.finalStats.FOR}</div><div class="attr-desc">${d.descFOR}</div></div>
            <div class="attr-box"><div class="attr-title">Inteligência 🧠: ${d.finalStats.INT}</div><div class="attr-desc">${d.descINT}</div></div>
            <div class="attr-box"><div class="attr-title">Agilidade ⚡: ${d.finalStats.AGI}</div><div class="attr-desc">${d.descAGI}</div></div>
            <div class="attr-box"><div class="attr-title">Vitalidade ❤️: ${d.finalStats.VIT}</div><div class="attr-desc">${d.descVIT}</div></div>
            <div class="attr-box"><div class="attr-title">Carisma 🗣️: ${d.finalStats.CAR}</div><div class="attr-desc">${d.descCAR}</div></div>
            <div class="attr-box"><div class="attr-title">Sorte 🍀: ${d.finalStats.SOR}</div><div class="attr-desc">${d.descSOR}</div></div>

            <div class="summary-skill">
                <span class="summary-skill-title">🔥 ${d.skill} (${d.cost} MP 💎)</span>
                ${d.desc}<br><br>
                <div style="background:var(--parchment-dark); color:var(--ink); padding:6px; font-weight:bold; display:inline-block; border-radius:4px; border:1px solid var(--gold);">${d.danoPronto}</div>
            </div>
        `;

        document.getElementById('card-content').innerHTML = cardHTML;
        document.getElementById('creation-screen').style.display = 'none';
        document.getElementById('summary-screen').style.display = 'block';
    }

    function sendWhatsApp() {
        let d = characterData;
        let text = `🛡️ *NOVA LENDA CHEGOU À MESA!* 🛡️\n\n`;
        text += `👤 *Nome:* ${d.name}\n`;
        text += `🐉 *Classe:* ${d.cls}\n`;
        text += `🎭 *Personalidade:* ${d.personality}\n`;
        text += `_"${d.personalityDesc}"_\n\n`;
        text += `❤️ *HP:* ${d.hp} / ${d.hp}\n`;
        text += `💎 *MP:* ${d.mp} / ${d.mp}\n`;
        text += `🏋️ *Carga:* ${d.carga} kg\n`;
        text += `🎒 *Equipamento:* Roupas Comuns (0 Defesa)\n\n`;
        
        text += `📊 *ATRIBUTOS NA PRÁTICA:*\n`;
        text += `💪 *FOR (${d.finalStats.FOR}):* ${d.descFOR}\n\n`;
        text += `🧠 *INT (${d.finalStats.INT}):* ${d.descINT}\n\n`;
        text += `⚡ *AGI (${d.finalStats.AGI}):* ${d.descAGI}\n\n`;
        text += `❤️ *VIT (${d.finalStats.VIT}):* ${d.descVIT}\n\n`;
        text += `🗣️ *CAR (${d.finalStats.CAR}):* ${d.descCAR}\n\n`;
        text += `🍀 *SOR (${d.finalStats.SOR}):* ${d.descSOR}\n\n`;
        
        text += `🔥 *HABILIDADE ESPECIAL:*\n`;
        text += `*${d.skill}* (Custo: ${d.cost} MP 💎)\n_${d.desc}_\n`;
        text += `👉 *${d.danoPronto}*`;

        let zapLink = `whatsapp://send?text=${encodeURIComponent(text)}`;
        window.location.href = zapLink;
    }

    function startGame(mode) {
        localStorage.setItem('rpg_character', JSON.stringify(characterData));
        if(mode === 'com_mestre') {
            window.location.href = 'commestre.html'; // Seguindo a sua lógica de tela individual!
        } else {
            alert('🤖 Aguarde a v2.0! O modo "Jogar Sem Mestre" está sendo forjado nas profundezas e chegará em breve.');
            toggleFabMenu(); // Fecha o menu para o usuário não ficar preso
        }
    }

    window.onload = function() { initStats(); resetAndUpdate(); };
</script>

</body>
</html>
